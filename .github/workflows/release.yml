name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-tag:
    name: Validate tag
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Derive release metadata
        id: meta
        run: |
          version="${GITHUB_REF_NAME}"
          cargo_version="$(sed -nE 's/^version = "([^"]+)"/\1/p' Cargo.toml | head -n1)"

          if [[ -z "${cargo_version}" ]]; then
            echo "Could not read Cargo.toml version" >&2
            exit 1
          fi

          if [[ "v${cargo_version}" != "${version}" ]]; then
            echo "Tag ${version} does not match Cargo.toml version v${cargo_version}" >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Verify release inputs
        run: |
          cargo fmt -- --check
          cargo clippy --tests -- -D warnings
          cargo test -- --nocapture

  build-artifacts:
    name: Build ${{ matrix.target }}
    needs: validate-tag
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # TODO: add x86_64-apple-darwin once Intel macOS users need it.
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            archive_name: scaler-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive_name: scaler-${{ github.ref_name }}-aarch64-unknown-linux-gnu.tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive_name: scaler-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build release binary
        run: cargo build --release

      - name: Package binary
        env:
          VERSION: ${{ needs.validate-tag.outputs.version }}
          TARGET: ${{ matrix.target }}
          ARCHIVE_NAME: ${{ matrix.archive_name }}
        run: |
          package_dir="dist/scaler-${VERSION}-${TARGET}"
          mkdir -p "${package_dir}"
          cp target/release/scaler "${package_dir}/scaler"
          cp README.md "${package_dir}/README.md"
          tar -C dist -czf "dist/${ARCHIVE_NAME}" "scaler-${VERSION}-${TARGET}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/${{ matrix.archive_name }}
          if-no-files-found: error

  publish-release:
    name: Publish release
    needs:
      - validate-tag
      - build-artifacts
    runs-on: ubuntu-24.04
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate checksums
        working-directory: release-artifacts
        run: sha256sum *.tar.gz > SHA256SUMS.txt

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.validate-tag.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          if gh release view "${VERSION}" -R "${REPO}" >/dev/null 2>&1; then
            gh release upload "${VERSION}" release-artifacts/* --clobber -R "${REPO}"
          else
            gh release create "${VERSION}" release-artifacts/* \
              --title "${VERSION}" --generate-notes -R "${REPO}"
          fi
